<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>KoDeal 딜 도우미</title>
  <script src="https://cdn.jsdelivr.net/npm/@anthropic-ai/sdk"></script>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      --accent: #D85A30;
      --accent-light: #FAECE7;
      --accent-dark: #993C1D;
      --text-primary: #1a1a1a;
      --text-secondary: #6b6b6b;
      --text-muted: #9b9b9b;
      --bg: #f5f4f0;
      --surface: #ffffff;
      --border: rgba(0,0,0,0.08);
      --border-strong: rgba(0,0,0,0.14);
      --radius-sm: 8px;
      --radius-md: 12px;
      --radius-lg: 16px;
    }
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      background: var(--bg);
      color: var(--text-primary);
      font-size: 14px;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
    }
    header {
      background: var(--surface);
      border-bottom: 1px solid var(--border);
      padding: 0 20px;
      height: 56px;
      display: flex;
      align-items: center;
      gap: 12px;
    }
    .logo { font-size: 20px; font-weight: 700; color: var(--accent); text-decoration: none; }
    .logo span { color: var(--text-primary); }
    .page-title { font-size: 13px; color: var(--text-muted); }

    main {
      max-width: 640px;
      margin: 32px auto;
      padding: 0 20px;
      width: 100%;
    }

    .card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius-lg);
      padding: 24px;
      margin-bottom: 16px;
    }
    .card-title {
      font-size: 15px;
      font-weight: 600;
      margin-bottom: 4px;
    }
    .card-sub {
      font-size: 12px;
      color: var(--text-muted);
      margin-bottom: 16px;
    }
    .input-wrap {
      display: flex;
      gap: 8px;
    }
    .url-input {
      flex: 1;
      padding: 10px 14px;
      border: 1px solid var(--border-strong);
      border-radius: var(--radius-sm);
      font-size: 13px;
      color: var(--text-primary);
      background: var(--surface);
      outline: none;
      font-family: inherit;
    }
    .url-input:focus { border-color: var(--accent); }
    .analyze-btn {
      padding: 10px 18px;
      background: var(--accent);
      color: white;
      border: none;
      border-radius: var(--radius-sm);
      font-size: 13px;
      font-weight: 500;
      cursor: pointer;
      white-space: nowrap;
      transition: background 0.15s;
    }
    .analyze-btn:hover { background: var(--accent-dark); }
    .analyze-btn:disabled { opacity: 0.6; cursor: not-allowed; }

    .result-card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius-lg);
      padding: 24px;
      display: none;
    }
    .result-card.visible { display: block; }

    .result-section { margin-bottom: 20px; }
    .result-label {
      font-size: 10px;
      font-weight: 600;
      color: var(--text-muted);
      text-transform: uppercase;
      letter-spacing: 0.5px;
      margin-bottom: 8px;
    }

    .title-option {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 10px 14px;
      border: 1px solid var(--border-strong);
      border-radius: var(--radius-sm);
      margin-bottom: 6px;
      cursor: pointer;
      transition: all 0.15s;
    }
    .title-option:hover { border-color: var(--accent); background: var(--accent-light); }
    .title-option.selected { border-color: var(--accent); background: var(--accent-light); }
    .title-text { font-size: 13px; font-weight: 500; }
    .title-len { font-size: 11px; color: var(--text-muted); }
    .copy-icon { font-size: 16px; opacity: 0.5; }

    .info-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 10px;
    }
    .info-item {
      background: var(--bg);
      border-radius: var(--radius-sm);
      padding: 10px 12px;
    }
    .info-item-label { font-size: 10px; color: var(--text-muted); margin-bottom: 3px; }
    .info-item-value { font-size: 13px; font-weight: 500; }

    .affiliate-link {
      background: var(--bg);
      border-radius: var(--radius-sm);
      padding: 10px 12px;
      font-size: 12px;
      color: var(--text-secondary);
      word-break: break-all;
      line-height: 1.6;
      display: flex;
      align-items: flex-start;
      justify-content: space-between;
      gap: 8px;
    }
    .copy-btn {
      padding: 5px 12px;
      background: var(--accent);
      color: white;
      border: none;
      border-radius: 6px;
      font-size: 11px;
      cursor: pointer;
      white-space: nowrap;
      flex-shrink: 0;
    }
    .copy-btn:hover { background: var(--accent-dark); }

    .loading {
      text-align: center;
      padding: 32px;
      color: var(--text-muted);
      font-size: 13px;
    }
    .loading-dot {
      display: inline-block;
      animation: bounce 1.2s infinite;
    }
    .loading-dot:nth-child(2) { animation-delay: 0.2s; }
    .loading-dot:nth-child(3) { animation-delay: 0.4s; }
    @keyframes bounce {
      0%, 80%, 100% { transform: translateY(0); }
      40% { transform: translateY(-6px); }
    }

    .go-btn {
      display: block;
      width: 100%;
      padding: 12px;
      background: var(--accent);
      color: white;
      border: none;
      border-radius: var(--radius-sm);
      font-size: 14px;
      font-weight: 500;
      cursor: pointer;
      text-align: center;
      margin-top: 20px;
      transition: background 0.15s;
      text-decoration: none;
    }
    .go-btn:hover { background: var(--accent-dark); }

    .tip {
      font-size: 12px;
      color: var(--text-muted);
      margin-top: 8px;
      line-height: 1.5;
    }
  </style>
</head>
<body>

<header>
  <a href="https://kodeal.us" class="logo">Ko<span>Deal</span></a>
  <span class="page-title">딜 도우미</span>
</header>

<main>
  <div class="card">
    <div class="card-title">🔗 아마존 링크 붙여넣기</div>
    <div class="card-sub">링크를 입력하면 제목 추천 + 어필리에이트 링크를 자동으로 만들어드려요</div>
    <div class="input-wrap">
      <input class="url-input" id="urlInput" placeholder="https://www.amazon.com/..." type="url" />
      <button class="analyze-btn" id="analyzeBtn" onclick="analyze()">분석하기</button>
    </div>
    <p class="tip">💡 아마존 외 다른 쇼핑몰 링크도 붙여넣으면 제목 추천해드려요!</p>
  </div>

  <div class="result-card" id="resultCard">
    <div class="loading" id="loadingState">
      <div>분석 중<span class="loading-dot">.</span><span class="loading-dot">.</span><span class="loading-dot">.</span></div>
    </div>
    <div id="resultContent" style="display:none;">
      <div class="result-section">
        <div class="result-label">✍️ 추천 제목 (클릭해서 선택)</div>
        <div id="titleOptions"></div>
      </div>
      <div class="result-section">
        <div class="result-label">📋 딜 정보</div>
        <div class="info-grid" id="dealInfo"></div>
      </div>
      <div class="result-section">
        <div class="result-label">🔗 어필리에이트 링크</div>
        <div class="affiliate-link">
          <span id="affiliateLink"></span>
          <button class="copy-btn" onclick="copyLink()">복사</button>
        </div>
      </div>
      <a href="https://kodeal.us/?admin=true" class="go-btn" target="_blank">→ KoDeal에 올리러 가기</a>
    </div>
  </div>
</main>

<script>
  const ASSOCIATE_TAG = 'kodeal-20';
  let selectedTitle = '';

  function makeAffiliateLink(url) {
    try {
      const u = new URL(url);
      // 깔끔하게 dp/ASIN만 추출
      const asinMatch = url.match(/\/dp\/([A-Z0-9]{10})/);
      if (asinMatch) {
        return `https://www.amazon.com/dp/${asinMatch[1]}?tag=${ASSOCIATE_TAG}`;
      }
      u.searchParams.set('tag', ASSOCIATE_TAG);
      return u.toString();
    } catch {
      return url + '?tag=' + ASSOCIATE_TAG;
    }
  }

  function isAmazon(url) {
    return url.includes('amazon.com');
  }

  async function analyze() {
    const url = document.getElementById('urlInput').value.trim();
    if (!url) { alert('링크를 입력해주세요!'); return; }

    const btn = document.getElementById('analyzeBtn');
    btn.disabled = true;
    btn.textContent = '분석 중...';

    const resultCard = document.getElementById('resultCard');
    const loadingState = document.getElementById('loadingState');
    const resultContent = document.getElementById('resultContent');

    resultCard.classList.add('visible');
    loadingState.style.display = 'block';
    resultContent.style.display = 'none';

    // 어필리에이트 링크 만들기
    const affLink = isAmazon(url) ? makeAffiliateLink(url) : url;
    document.getElementById('affiliateLink').textContent = affLink;

    try {
      const response = await fetch('https://api.anthropic.com/v1/messages', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({
          model: 'claude-sonnet-4-6',
          max_tokens: 1000,
          messages: [{
            role: 'user',
            content: `다음 쇼핑몰 링크를 분석해서 KoDeal 할인 정보 사이트에 올릴 정보를 JSON으로만 반환해줘. 마크다운 없이 순수 JSON만.

링크: ${url}

반환 형식:
{
  "titles": ["제목1 (15-25자, 브랜드+제품+할인정보)", "제목2", "제목3"],
  "category": "뷰티 또는 패션 또는 마트 또는 리빙 또는 테크 또는 특가",
  "store": "쇼핑몰명 (Amazon, Sephora 등)",
  "brand": "브랜드명"
}

제목 규칙:
- 한국어로 작성
- 15~25자
- 브랜드명 + 제품명 + 할인정보 포함
- 느낌표 사용 금지
- 예시: "네스프레소 에스프레소 머신 - 40% 할인"`
          }]
        })
      });

      const data = await response.json();
      const text = data.content[0].text;
      const clean = text.replace(/```json|```/g, '').trim();
      const result = JSON.parse(clean);

      // 제목 옵션
      const titleOptions = document.getElementById('titleOptions');
      titleOptions.innerHTML = result.titles.map((t, i) => `
        <div class="title-option" onclick="selectTitle(this, '${t.replace(/'/g, "\\'")}')">
          <span class="title-text">${t}</span>
          <span class="title-len">${t.length}자</span>
        </div>
      `).join('');

      // 딜 정보
      document.getElementById('dealInfo').innerHTML = `
        <div class="info-item">
          <div class="info-item-label">브랜드</div>
          <div class="info-item-value">${result.brand || '-'}</div>
        </div>
        <div class="info-item">
          <div class="info-item-label">카테고리</div>
          <div class="info-item-value">${result.category || '-'}</div>
        </div>
        <div class="info-item">
          <div class="info-item-label">쇼핑몰</div>
          <div class="info-item-value">${result.store || '-'}</div>
        </div>
        <div class="info-item">
          <div class="info-item-label">어필리에이트</div>
          <div class="info-item-value" style="color: #22c55e;">✓ 적용됨</div>
        </div>
      `;

      loadingState.style.display = 'none';
      resultContent.style.display = 'block';

    } catch (err) {
      loadingState.innerHTML = '<div style="color:#ff4444;">분석 실패. 다시 시도해주세요.</div>';
      console.error(err);
    }

    btn.disabled = false;
    btn.textContent = '분석하기';
  }

  function selectTitle(el, title) {
    document.querySelectorAll('.title-option').forEach(e => e.classList.remove('selected'));
    el.classList.add('selected');
    selectedTitle = title;
    // 클립보드 복사
    navigator.clipboard.writeText(title).then(() => {
      el.querySelector('.title-text').textContent = title + ' ✓복사됨';
      setTimeout(() => { el.querySelector('.title-text').textContent = title; }, 1500);
    });
  }

  function copyLink() {
    const link = document.getElementById('affiliateLink').textContent;
    navigator.clipboard.writeText(link).then(() => {
      document.querySelector('.copy-btn').textContent = '복사됨!';
      setTimeout(() => { document.querySelector('.copy-btn').textContent = '복사'; }, 1500);
    });
  }

  // Enter 키로 분석
  document.getElementById('urlInput').addEventListener('keydown', e => {
    if (e.key === 'Enter') analyze();
  });
</script>
</body>
</html>
